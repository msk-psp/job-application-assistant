name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: npm run check
      - name: Validate extension manifest
        run: node -e "JSON.parse(require('node:fs').readFileSync('manifest.json'))"
