<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>입사 지원서 작성 도우미</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body class="popup">
    <header class="popup-header">
      <div>
        <h1>입사 지원서 작성 도우미</h1>
        <p id="site-label">현재 페이지 확인 중...</p>
      </div>
      <button id="settings" class="icon-button" title="고급 프로필 설정" aria-label="고급 프로필 설정">&#9881;</button>
    </header>

    <main>
      <section id="onboarding" class="onboarding" hidden>
        <h2>PDF 이력서로 시작</h2>
        <p>한 번 가져오면 프로필을 자동으로 만들고 이 브라우저에만 저장합니다.</p>
        <label class="file-picker">PDF 이력서
          <input id="quick-resume-file" type="file" accept="application/pdf,.pdf">
        </label>
        <button id="quick-import" class="primary full-button" type="button">이력서 가져오기</button>
      </section>

      <section id="ready" hidden>
        <div class="toolbar ready-toolbar">
          <button id="fill" class="primary" disabled>선택 항목 입력</button>
          <button id="scan" title="현재 페이지 다시 스캔">다시 스캔</button>
        </div>
        <section id="suggestions" class="suggestions" aria-label="입력 제안"></section>
      </section>

      <p id="status" class="status" aria-live="polite"></p>

      <footer class="popup-footer">
        <button id="open-test" type="button">안전한 테스트 폼</button>
        <button id="edit-profile" type="button">프로필 수정</button>
      </footer>
    </main>

    <script type="module" src="popup.js"></script>
  </body>
</html>
